  stack: system  # system/gvisor/mixed
  device: utun0
  auto-route: true
  auto-detect-interface: true
  strict-route: true
  dns-hijack:
    - any:53
    - tcp://any:53
  route-exclude-address:
    # - 0.0.0.0/8
    - 10.0.0.0/8
    # - 127.0.0.0/8
    - 169.254.0.0/16
    - 172.16.0.0/12
